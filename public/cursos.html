<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cursos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo.titulo">
            <img src="img/logo.png" alt="Instituto Federal Catarinense" class="logo">
            <h1>Cadastro de Cursos</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Página Inicial</a></li>
                <li><a href="professores.html">Cadastro de Professores</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <button id="addCurso">Adicionar Curso</button>
        <table id="cursosTable">
            <thead>
                <tr>
                    <th>Nome do Curso</th>
                    <th>Sigla</th>
                    <th>Descrição</th>
                    <th>Coordenador</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </main>
    <div id="cursoModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Adicionar/Editar Curso</h2>
            <form id="cursoForm">
                <input type="hidden" id="codigo" name="codigo" required>
                <label for="nomeCurso">Nome do Curso:</label>
                <input type="text" id="nomeCurso" name="nomeCurso" required>
                <label for="sigla">Sigla:</label>
                <input type="text" id="sigla" name="sigla" required>
                <label for="descricao">Descrição:</label>
                <textarea id="descricao" name="descricao" required></textarea>
                <label for="coordenador">Coordenador:</label>
                <select id="coordenador" name="coordenador" required></select>
                <button type="submit">Salvar</button>
            </form>
        </div>
    </div>
        <script src="cursos.js"></script>
    </body>
</html>
